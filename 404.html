<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando...</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #0d1117; color: #c9d1d9; }
    .loader { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    (function() {
      'use strict';

      var fullPath = window.location.pathname.replace(/\/+$/, ''); // ex: /website/sobre → /website/sobre

      // Detecta subdiretório (GitHub Pages project site)
      // O subdiretório é o primeiro segmento se não for uma página conhecida
      var segs = fullPath.split('/').filter(Boolean);
      var knownPages = ['sobre','contato','anuncie','politica-de-privacidade','feed','categoria','artigo','public','admin','index'];
      var siteBase = '';
      var relPath = fullPath; // caminho relativo ao site

      if (segs.length > 1 && knownPages.indexOf(segs[0]) === -1) {
        // Primeiro segmento é o subdiretório (ex: /website)
        siteBase = '/' + segs[0];
        relPath = '/' + segs.slice(1).join('/');
      }

      // --- ROTEAMENTO ---

      // Páginas estáticas: /sobre → /sobre.html
      var staticPages = {'/sobre':1, '/contato':1, '/anuncie':1, '/politica-de-privacidade':1, '/feed':1};
      if (relPath in staticPages) {
        window.location.replace(siteBase + relPath + '.html');
        return;
      }

      // Páginas de categoria: /categoria ou /categoria/usinagem
      var catMatch = relPath.match(/^\/categoria(?:\/([^\/]+))?/);
      if (catMatch) {
        var cat = catMatch[1] || '';
        window.location.replace(siteBase + '/categoria.html' + (cat ? '?cat=' + encodeURIComponent(cat) : ''));
        return;
      }

      // Páginas de artigo: /artigo/meu-slug
      var artMatch = relPath.match(/^\/artigo\/([^\/]+)/);
      if (artMatch) {
        window.location.replace(siteBase + '/artigo.html?slug=' + encodeURIComponent(artMatch[1]));
        return;
      }

      // Qualquer outra coisa: redireciona pra home
      window.location.replace(siteBase + '/');
    })();
  </script>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirecionando...</p>
  </div>
</body>
</html>
